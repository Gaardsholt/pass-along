name: Test

on:
  pull_request:

concurrency:
  group: ${{ format('{0}-test-{1}', github.event.repository.name, github.head_ref || github.ref_name) }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"

      - name: Run snapshot action
        uses: actions/go-dependency-submission@f35d5c9af13ce9cc32f7930b171e315e878f6921 # v2.0.3
        with:
          go-mod-path: "go.mod"

      - name: Fuzz tests
        run: |
          fuzztime=10s

          while IFS= read -r package; do
            targets=$(go test "$package" -run=^$ -list '^Fuzz' | grep '^Fuzz' || true)
            if [[ -z "$targets" ]]; then
              continue
            fi

            while IFS= read -r target; do
              echo "Fuzzing ${package}/${target}"
              go test "$package" -run=^$ -fuzz="^${target}$" -fuzztime="$fuzztime"
            done <<< "$targets"
          done < <(go list ./...)

      - name: Go format
        run: |
          go fmt ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          args: "--fix"

      - name: Suggest changes
        if: always()
        uses: reviewdog/action-suggester@aa38384ceb608d00f84b4690cacc83a5aba307ff # v1.24.0
        with:
          tool_name: go static analysis
